<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealZone Marketing Admin (اللوحة السرية)</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 5px; }
        .header p { color: #6b7280; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
        .product-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .post-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 15px; height: 150px; overflow-y: auto; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-family: 'Tajawal'; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn:hover { background: #4338ca; }
        .btn.copied { background: #10b981; }
        .whatsapp-btn { background: #25D366; margin-top: 10px; }
        .whatsapp-btn:hover { background: #1da851; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 مصنع الـ Traffic والعمولات</h1>
        <p>انسخ المنشورات الجاهزة دي وانشرها في جروبات الفيسبوك والواتساب واكسب فوراً</p>
    </div>

    <div class="grid" id="marketing-grid">
        <!-- Generated by JS -->
    </div>

    <script src="database_v3.js"></script>
    <script>
        function generatePostText(deal) {
            const savings = deal.competitorPrice - deal.newPrice;
            const discountPercent = Math.round((savings / deal.competitorPrice) * 100);
            
            const siteUrl = "https://ashrafzaki751-hue.github.io/DealZone/";
            
            const templates = [
                `🔥 حرق أسعار حرفياً من ${deal.store}! 🔥\n\nاللي بيدور على (${deal.title})، الحقوا العرض ده قبل ما يخلص 🏃‍♂️💨\n\n💰 السعر: ${deal.newPrice} ${deal.currency} (بدل ${deal.competitorPrice})\n🤑 التوفير: ${discountPercent}%\n\n🎁 (مفاجأة: أول ما تدخل الموقع هتلاقي عروض شحن رصيد مجانية بمناسبة الافتتاح 📱✨)\n\n👇 رابط الشراء المباشر (اضغط هنا):\n\n ${deal.link} \n\n#عروض #خصومات #شحن_رصيد #${deal.category}`,
                
                `🚨 عرض فلاش حصري! 🚨\n\nلقيتلكم عرض لقطة على (${deal.title}) مش هيتكرر تاني! 🤩\n\n💵 السعر: ${deal.newPrice} ${deal.currency} فقط!\n🔥 ${deal.savingNote}\n\n📱 وكمان في عروض وكروت شحن رصيد مجانية موجودة جوه الموقع للزوار الجداد!\n\n🛒 رابط العرض المباشر:\n\n ${deal.link} \n\n#توفير #تسوق_أونلاين #كروت_شحن`,

                `🔥 جبتلكم أرخص سعر لـ (${deal.title}) في مصر كلها! 🔥\n\nالسعر نزل لـ ${deal.newPrice} ${deal.currency} بس 😱\n\nتقدروا تشوفوا العرض وتطلبوه من موقعنا المعتمد اللي بيجمع أرخص الأسعار وكمان بيوزع هدايا وشحن رصيد للموبايل:\n\n ${siteUrl} \n\nادخلوا الموقع وابحثوا عن اسم المنتج أو جربوا المستشار الذكي 🤖✨`
            ];
            
            return templates[Math.floor(Math.random() * templates.length)];
        }

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerHTML;
                btnElement.innerHTML = "✅ تم النسخ بنجاح! انشره الآن";
                btnElement.classList.add('copied');
                setTimeout(() => {
                    btnElement.innerHTML = originalText;
                    btnElement.classList.remove('copied');
                }, 3000);
            });
        }

        function renderMarketingDashboard() {
            const grid = document.getElementById('marketing-grid');
            // Show only the authentic deals for marketing
            const dealsToPromote = realDeals; 
            
            dealsToPromote.forEach(deal => {
                const postText = generatePostText(deal);
                const encodedText = encodeURIComponent(postText);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="product-info">
                        <img src="${deal.image}" class="product-img" onerror="this.src='https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=100'">
                        <div>
                            <h3 style="margin: 0 0 5px 0; font-size: 16px;">${deal.title}</h3>
                            <span style="background: #fee2e2; color: #ef4444; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: bold;">العمولة جاهزة</span>
                        </div>
                    </div>
                    <div class="post-box" id="post-${deal.id}">${postText}</div>
                    <button class="btn" onclick="copyToClipboard(document.getElementById('post-${deal.id}').innerText, this)">📋 انسخ البوست للفيسبوك</button>
                    <a href="https://api.whatsapp.com/send?text=${encodedText}" target="_blank" style="text-decoration: none;">
                        <button class="btn whatsapp-btn">💬 شارك فوراً على واتساب</button>
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = renderMarketingDashboard;
    </script>
</body>
</html>
